<!DOCTYPE html>
<html>
<head>
  <title>For You 💌</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #ffc0cb, #ff9eb5);
      overflow: hidden;
      color: #b45656;
    }

    .page {
      display: none;
      height: 100vh;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    .active {
      display: flex;
    }

    .corner-img {
      position: absolute;
      width: 15px;
      height: 15px;
      object-fit: cover;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }
    
    .top-center-img {
      position: absolute;
      top: -60px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 120px;
      object-fit: cover;
     
    }

    /* 🌸 CONTAINER CARD */
    .card {
      position: relative;
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(12px);
      padding: 25px;
      border-radius: 20px;
      text-align: center;
      width: 320px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .cardfinal {
      position: relative;
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(12px);
      padding: 25px;
      border-radius: 20px;
      text-align: center;
      width: 550px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    /* 🍓 STRAWBERRY */
    .strawberry {
      position: absolute;
      font-size: 50px;
      opacity: 0.7;
      animation: float 6s infinite ease-in-out;
    }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-25px); }
      100% { transform: translateY(0px); }
    }

    button {
      margin-top: 15px;
      padding: 10px 20px;
      border: none;
      border-radius: 15px;
      background-color: #ff6f91;
      color: white;
      cursor: pointer;
      width: 100%;
    }

    button:hover {
      background-color: #ff3e6c;
    }

    input {
      padding: 10px;
      border-radius: 10px;
      border: none;
      width: 90%;
      margin-top: 10px;
    }

    /* PAGE 2 */
    .heart {
      font-size: 70px;
      cursor: pointer;
      margin: 10px 0;
    }

    .progress-container {
      width: 100%;
      height: 18px;
      background: rgba(255,255,255,0.4);
      border-radius: 20px;
      overflow: hidden;
      margin-top: 10px;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: #ff4d6d;
    }

    /* PAGE 3 */
    .image-box {
      width: 100%;
      height: 250px;
      border-radius: 15px;
      overflow: hidden;
      margin-bottom: 10px;
    }

    img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* PAGE 4 */
    .end {
      margin-top: 20px;
      opacity: 0;
      transition: 1s;
    }

    .show {
      opacity: 1;
    }
  </style>
</head>

<body>

<!------AUDIO------->
<audio autoplay loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<!-- PAGE 1 -->
<div id="page1" class="page active">

<!-- PAGE 3 -->

  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));

function showEnding() {
  document.getElementById("ending").classList.add("show");
}

/* TYPE EFFECT */
function typeText(text, el, speed=50) {
  el.innerHTML = "";
  let i = 0;
  function typing() {
    if(i < text.length) {
      el.innerHTML += text.charAt(i);
      i++;
      setTimeout(typing, speed);
    }
  }
  typing();
}

/* INIT */
typeText(slides[0].text, document.getElementById("text"));
</script>

</body>
</html>
